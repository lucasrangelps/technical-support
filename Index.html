<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ZapTécnico</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1e2530;
      --border: #2a3240;
      --green: #25D366;
      --green-dark: #1aab52;
      --green-glow: rgba(37, 211, 102, 0.18);
      --accent: #00e5a0;
      --text: #e6edf3;
      --text-muted: #7d8fa1;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      max-width: 480px;
      padding: 20px 24px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo span { color: var(--green); }
    .user-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: border-color .2s;
    }
    .user-chip:hover { border-color: var(--green); }
    .user-chip .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    /* ── MAIN ── */
    main {
      width: 100%;
      max-width: 480px;
      padding: 8px 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      flex: 1;
    }

    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── INPUT ── */
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      font-size: 17px;
      pointer-events: none;
    }
    input[type="tel"], input[type="text"], textarea {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 14px 14px 14px 44px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      -webkit-appearance: none;
    }
    textarea {
      padding: 14px;
      resize: none;
      min-height: 130px;
      line-height: 1.55;
      font-size: 14px;
    }
    input:focus, textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px var(--green-glow);
    }
    input::placeholder, textarea::placeholder { color: var(--text-muted); }

    /* ── TYPE SELECTOR ── */
    .type-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .type-option {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color .2s, background .2s;
      user-select: none;
    }
    .type-option.selected {
      border-color: var(--green);
      background: var(--green-glow);
    }
    .type-option .type-icon {
      font-size: 22px;
      flex-shrink: 0;
    }
    .type-option .type-info { flex: 1; }
    .type-option .type-name {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    .type-option .type-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .type-option .radio {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color .2s;
    }
    .type-option.selected .radio {
      border-color: var(--green);
    }
    .type-option.selected .radio::after {
      content: '';
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--green);
    }

    /* ── MESSAGE PREVIEW ── */
    .msg-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
    }
    .edit-btn {
      font-size: 12px;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .edit-btn:hover { opacity: .75; }

    /* ── SEND BUTTON ── */
    .btn-send {
      width: 100%;
      background: var(--green);
      color: #0d1117;
      border: none;
      border-radius: var(--radius);
      padding: 18px;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 4px 24px rgba(37, 211, 102, 0.3);
      -webkit-appearance: none;
    }
    .btn-send:hover { background: var(--green-dark); box-shadow: 0 4px 32px rgba(37, 211, 102, 0.45); }
    .btn-send:active { transform: scale(0.97); }
    .btn-send:disabled {
      background: var(--surface2);
      color: var(--text-muted);
      box-shadow: none;
      cursor: not-allowed;
    }
    .btn-send svg { flex-shrink: 0; }

    /* ── ONBOARDING OVERLAY ── */
    #onboarding {
      position: fixed; inset: 0;
      background: rgba(13,17,23,0.97);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      backdrop-filter: blur(8px);
    }
    .onboarding-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: slideUp .4s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .onboarding-emoji { font-size: 52px; line-height: 1; }
    .onboarding-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      line-height: 1.25;
    }
    .onboarding-title span { color: var(--green); }
    .onboarding-sub {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
    }
    .onboarding-input-wrap {
      position: relative;
      width: 100%;
    }
    .onboarding-input-wrap input {
      padding: 16px 16px;
      font-size: 16px;
      text-align: center;
      border-radius: var(--radius);
    }
    .btn-confirm {
      width: 100%;
      background: var(--green);
      color: #0d1117;
      border: none;
      border-radius: var(--radius);
      padding: 16px;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: background .2s, transform .1s;
      -webkit-appearance: none;
    }
    .btn-confirm:active { transform: scale(0.97); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 99px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      white-space: nowrap;
      z-index: 200;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- ONBOARDING -->
<div id="onboarding">
  <div class="onboarding-card">
    <div class="onboarding-emoji">👋</div>
    <div class="onboarding-title">Bem-vindo ao<br><span>ZapTécnico</span></div>
    <p class="onboarding-sub">Para personalizar suas mensagens, qual é o seu nome?</p>
    <div class="onboarding-input-wrap">
      <input type="text" id="nameInput" placeholder="Ex: João Silva" maxlength="40" autocomplete="given-name" />
    </div>
    <button class="btn-confirm" id="confirmName">Começar →</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">Zap<span>Técnico</span></div>
  <div class="user-chip" id="userChip" onclick="resetName()">
    <div class="dot"></div>
    <span id="chipName">…</span>
  </div>
</header>

<!-- MAIN -->
<main>

  <!-- CONTATO -->
  <div>
    <div class="section-label">Contato</div>
    <div class="card">
      <div class="input-wrap">
        <span class="input-icon">📞</span>
        <input type="tel" id="phoneInput" placeholder="Número com DDD  (11) 9 0000-0000"
          inputmode="numeric" maxlength="16" oninput="formatPhone(this)" />
      </div>
    </div>
  </div>

  <!-- TIPO DE MENSAGEM -->
  <div>
    <div class="section-label">Tipo de mensagem</div>
    <div class="card">
      <div class="type-grid" id="typeGrid">
        <div class="type-option selected" data-type="local_fechado" onclick="selectType(this)">
          <div class="type-icon">></div>
          <div class="type-info">
            <div class="type-name">Local fechado</div>
            <div class="type-desc">Aviso de visita sem atendimento</div>
          </div>
          <div class="radio"></div>
        </div>
        <!-- Futuros tipos podem ser adicionados aqui -->
      </div>
    </div>
  </div>

  <!-- MENSAGEM -->
  <div>
    <div class="section-label">Mensagem</div>
    <div class="card">
      <div class="msg-header">
        <span style="font-size:12px;color:var(--text-muted);">Edite se desejar</span>
        <button class="edit-btn" onclick="resetMessage()">↺ Restaurar</button>
      </div>
      <textarea id="msgBox" rows="5" spellcheck="true"></textarea>
    </div>
  </div>

  <!-- BOTÃO ENVIAR -->
  <button class="btn-send" id="sendBtn" onclick="sendWhatsApp()">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
      <path d="M12 0C5.373 0 0 5.373 0 12c0 2.126.555 4.126 1.526 5.862L.057 23.882a.5.5 0 0 0 .614.625l6.207-1.63A11.94 11.94 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.804 9.804 0 0 1-5.032-1.385l-.36-.214-3.733.981.997-3.648-.235-.373A9.783 9.783 0 0 1 2.182 12C2.182 6.57 6.57 2.182 12 2.182c5.43 0 9.818 4.388 9.818 9.818 0 5.43-4.388 9.818-9.818 9.818z"/>
    </svg>
    Abrir no WhatsApp
  </button>

</main>

<div id="toast"></div>

<script>
  // ── STATE ──
  const MESSAGES = {
    local_fechado: (nome) =>
      `Olá, meu nome é ${nome}, técnico que veio fazer a instalação da Internet na sua residência, tem alguém no local para atender agora?`
  };

  let userName = '';
  let selectedType = 'local_fechado';

  // ── ONBOARDING ──
  const stored = localStorage.getItem('zt_name');
  if (stored && stored.trim()) {
    userName = stored.trim();
    initApp();
  }

  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmNameFn();
  });

  document.getElementById('confirmName').addEventListener('click', confirmNameFn);

  function confirmNameFn() {
    const val = document.getElementById('nameInput').value.trim();
    if (!val) { shake(document.getElementById('nameInput')); return; }
    userName = val;
    localStorage.setItem('zt_name', userName);
    initApp();
  }

  function initApp() {
    document.getElementById('onboarding').style.display = 'none';
    document.getElementById('chipName').textContent = firstName(userName);
    refreshMessage();
  }

  function firstName(name) {
    return name.split(' ')[0];
  }

  function resetName() {
    if (!confirm('Alterar seu nome?')) return;
    document.getElementById('nameInput').value = userName;
    document.getElementById('onboarding').style.display = 'flex';
  }

  // ── TYPE SELECTION ──
  function selectType(el) {
    document.querySelectorAll('.type-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    selectedType = el.dataset.type;
    refreshMessage();
  }

  // ── MESSAGE ──
  function refreshMessage() {
    const gen = MESSAGES[selectedType];
    document.getElementById('msgBox').value = gen ? gen(userName) : '';
  }

  function resetMessage() {
    refreshMessage();
    toast('Mensagem restaurada ✓');
  }

  // Update message when user edits textarea (name chip click resets)
  // Auto-refresh on name change handled in initApp

  // ── PHONE FORMAT ──
  function formatPhone(input) {
    let v = input.value.replace(/\D/g, '');
    if (v.length > 11) v = v.slice(0, 11);
    if (v.length <= 2) {
      input.value = v.length ? `(${v}` : v;
    } else if (v.length <= 6) {
      input.value = `(${v.slice(0,2)}) ${v.slice(2)}`;
    } else if (v.length <= 10) {
      input.value = `(${v.slice(0,2)}) ${v.slice(2,6)}-${v.slice(6)}`;
    } else {
      input.value = `(${v.slice(0,2)}) ${v.slice(2,3)} ${v.slice(3,7)}-${v.slice(7)}`;
    }
  }

  // ── SEND ──
  function sendWhatsApp() {
    const raw = document.getElementById('phoneInput').value.replace(/\D/g, '');
    const msg = document.getElementById('msgBox').value.trim();

    if (!raw || raw.length < 10) {
      toast('⚠️ Insira um número válido');
      shake(document.getElementById('phoneInput'));
      return;
    }
    if (!msg) {
      toast('⚠️ A mensagem está vazia');
      return;
    }

    // Brazil prefix
    const number = raw.startsWith('55') ? raw : `55${raw}`;
    const url = `https://wa.me/${number}?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
  }

  // ── UTILS ──
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2400);
  }

  function shake(el) {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'shake .35s ease';
    setTimeout(() => el.style.animation = '', 400);
  }

  // Inject shake keyframes
  const style = document.createElement('style');
  style.textContent = `@keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
  }`;
  document.head.appendChild(style);
</script>
</body>
</html>
